<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#2563eb">
  <title>KET学习营 - 每日20分钟冲刺</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="app-header">
    <h1 id="app-title">🏠 KET学习营</h1>
  </div>

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div id="home-stats"></div>

    <h3 class="section-title">📋 今日任务（每天20分钟）</h3>
    <div class="module-grid">
      <div class="module-card" onclick="App.showView('words')">
        <div class="module-icon">📝</div>
        <div class="module-name">单词关卡</div>
        <div class="module-time">⏱️ 5分钟 · 每天10词</div>
      </div>
      <div class="module-card" onclick="App.showView('reading')">
        <div class="module-icon">📖</div>
        <div class="module-name">阅读理解</div>
        <div class="module-time">⏱️ 5分钟 · A2短文</div>
      </div>
      <div class="module-card" onclick="App.showView('listening')">
        <div class="module-icon">👂</div>
        <div class="module-name">听力练习</div>
        <div class="module-time">⏱️ 5分钟 · 真实场景</div>
      </div>
      <div class="module-card" onclick="App.showView('exam')">
        <div class="module-icon">✏️</div>
        <div class="module-name">真题训练</div>
        <div class="module-time">⏱️ 5分钟 · 按星期分配</div>
      </div>
    </div>

    <h3 class="section-title">🏆 成就墙</h3>
    <div class="achievements-grid" id="home-achievements"></div>
  </div>

  <!-- WORDS VIEW -->
  <div class="view" id="view-words"></div>

  <!-- READING VIEW -->
  <div class="view" id="view-reading"></div>

  <!-- LISTENING VIEW -->
  <div class="view" id="view-listening"></div>

  <!-- EXAM VIEW -->
  <div class="view" id="view-exam"></div>

  <!-- PARENT VIEW -->
  <div class="view" id="view-parent"></div>

  <!-- NAV BAR -->
  <div class="nav-bar">
    <div class="nav-item active" data-view="home" onclick="App.showView('home')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">首页</span>
    </div>
    <div class="nav-item" data-view="words" onclick="App.showView('words')">
      <span class="nav-icon">📝</span>
      <span class="nav-label">单词</span>
    </div>
    <div class="nav-item" data-view="reading" onclick="App.showView('reading')">
      <span class="nav-icon">📖</span>
      <span class="nav-label">阅读</span>
    </div>
    <div class="nav-item" data-view="listening" onclick="App.showView('listening')">
      <span class="nav-icon">👂</span>
      <span class="nav-label">听力</span>
    </div>
    <div class="nav-item" data-view="exam" onclick="App.showView('exam')">
      <span class="nav-icon">✏️</span>
      <span class="nav-label">真题</span>
    </div>
    <div class="nav-item" data-view="parent" onclick="App.showView('parent')">
      <span class="nav-icon">👨‍👩‍👦</span>
      <span class="nav-label">家长</span>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="data/words.js"></script>
<script src="data/reading.js"></script>
<script src="data/listening.js"></script>
<script src="data/exam.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
